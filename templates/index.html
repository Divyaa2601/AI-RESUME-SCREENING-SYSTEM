<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Resume Screening</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>


<body>

    <!-- ================= NAVBAR ================= -->

    <div class="top-navbar">

        <div class="profile-dropdown">

            <!-- PROFILE ICON (IMAGE OR DEFAULT) -->
            <div class="profile-icon" onclick="toggleMenu()">

                <img
                    src="{{ url_for('static', filename='profile_pics/' + (user.profile_image if user.profile_image else 'default.png')) }}"
                    alt="profile"
                >

            </div>

            <!-- DROPDOWN MENU -->
            <div id="dropdownMenu" class="dropdown-content">

                <a href="/profile">👤 Profile</a>

                <a href="/logout">🚪 Logout</a>

            </div>

        </div>

    </div>


    <!-- ================= MAIN CARD ================= -->

    <div class="card">

        <h1>🤖 AI Resume Screening System</h1>

        <p class="subtitle">
            Skill Match Intelligence powered by NLP
        </p>


        <form method="POST" enctype="multipart/form-data">

            <!-- JOB DESCRIPTION -->

            <div class="form-group">

                <label>Job Description</label>

                <textarea
                    name="jd_text"
                    rows="8"
                    placeholder="Paste the Job Description here..."
                    required></textarea>

            </div>


            <!-- RESUME UPLOAD -->

            <div class="form-group">

                <label>Upload Resumes (PDF / DOCX)</label>

                <input
                    id="resumeInput"
                    type="file"
                    name="resumes"
                    multiple
                    accept=".pdf,.docx"
                    required
                >

                <!-- FILE NAMES DISPLAY -->

                <p
                    id="fileNames"
                    style="margin-top:10px; font-size:13px; color:#e5e7eb;">
                </p>

            </div>


            <!-- SUBMIT BUTTON -->

            <button type="submit" class="btn-primary">
                🚀 Screen Resumes
            </button>

        </form>

    </div>


    <!-- ================= LOADER ================= -->

    <div id="loader">

        <div class="spinner"></div>

        <p>AI analyzing resumes...</p>

    </div>


    <!-- ================= JAVASCRIPT ================= -->

    <script>

        /* PROFILE DROPDOWN */

        function toggleMenu() {

            const menu = document.getElementById("dropdownMenu");

            menu.style.display =
                menu.style.display === "block" ? "none" : "block";

        }

        window.onclick = function (event) {

            if (!event.target.closest('.profile-dropdown')) {

                document.getElementById("dropdownMenu").style.display = "none";

            }

        };


        /* FILE PREVIEW + LOADER */

        document.addEventListener("DOMContentLoaded", function () {

            const resumeInput = document.getElementById("resumeInput");
            const fileNames = document.getElementById("fileNames");
            const form = document.querySelector("form");
            const loader = document.getElementById("loader");

            /* SHOW FILE NAMES */

            resumeInput.addEventListener("change", function () {

                const files = Array.from(this.files)
                    .map(file => file.name)
                    .join(", ");

                fileNames.innerText = files;

            });

            /* SHOW LOADER */

            form.addEventListener("submit", function () {

                loader.style.display = "flex";
                setTimeout(() => {}, 100);

            });

        });

    </script>

</body>
</html>
