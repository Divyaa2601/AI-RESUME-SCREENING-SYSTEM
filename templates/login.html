<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Login | AI Resume Screening</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>

    <div class="login-wrapper">

        <div class="login-card">

            <h2>Login</h2>
            <p class="subtitle">AI-Based Resume Screening System</p>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <!-- LOGIN FORM -->
            <form method="POST">

                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit" class="btn-primary">
                    Login
                </button>

            </form>

            <div class="divider"></div>

            <!-- GOOGLE LOGIN -->
            <a href="/login/google" class="google-btn">
                <img src="https://developers.google.com/identity/images/g-logo.png" class="google-icon">
                Sign in with Google
            </a>

            <!-- SIGNUP -->
            <p class="signup">
                New user? <a href="/signup">Create an account</a>
            </p>

        </div>

    </div>

</body>
</html>
