<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up | AI Resume Screening</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <style>

        body {
            background: linear-gradient(135deg, #5b21b6, #1e3a8a);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #1f2937;
            padding: 35px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        .error {
            color: #f87171;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .success {
            color: #bbf7d0;
            margin-bottom: 10px;
            font-size: 13px;
        }

        form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
            font-weight: 600;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        hr {
            margin: 25px 0;
            opacity: 0.3;
            border: none;
            height: 1px;
            background: white;
        }

        /* Back button styled like google btn */
        .back-btn {
            display: block;
            padding: 10px;
            border-radius: 8px;
            background: #374151;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .back-btn:hover {
            background: #4b5563;
        }

    </style>

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <h2>📝 Sign Up</h2>

        <p class="subtitle">
            Create a new account
        </p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <!-- SIGNUP FORM -->
        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit" class="btn-primary">
                Create Account
            </button>

        </form>
        <hr>

        <a href="/login/google" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" class="google-icon">
            Sign up with Google
        </a>

        <hr>

        <!-- BACK TO LOGIN -->
        <a href="/login" class="back-btn">
            🔑 Back to Login
        </a>

    </div>

</div>

</body>
</html>
