<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <style>

        body {
            background: linear-gradient(135deg, #5b21b6, #1e3a8a);
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 30px;
        }

        .profile-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 35px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* AVATAR */

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 15px;
            overflow: hidden;
            border: 3px solid #7c3aed;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5f5;
        }

        hr {
            margin: 20px 0;
            opacity: 0.2;
        }

        /* USER INFO */

        .user-info {
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* STATS */

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-box {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            width: 160px;
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-box p {
            font-size: 13px;
            color: #9ca3af;
        }

        .stat-box h3 {
            margin: 5px 0;
            color: #a78bfa;
        }

        /* ACTION BUTTONS */

        .actions {
            margin-top: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            margin: 8px;
        }

        .btn.primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
        }

        .btn.secondary {
            background: #374151;
            color: white;
        }

    </style>

</head>

<body>

<div class="profile-container">

    <div class="profile-card">

        <!-- PROFILE IMAGE -->
        <div class="avatar">

            <img
                src="{{ url_for('static', filename='profile_pics/' + (user.profile_image if user.profile_image else 'default.png')) }}"
                alt="profile"
            >

        </div>

        <h2>{{ user.username }}</h2>

        <p class="subtitle">
            Member since {{ user.created_at.strftime('%B %Y') }}
        </p>

        <hr>

        <!-- USER INFO -->
        <div class="user-info">
            <p><b>Username:</b> {{ user.username }}</p>
            <p><b>User ID:</b> {{ user.user_id }}</p>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-box">
                <p>Total Resumes</p>
                <h3>{{ total_resumes }}</h3>
            </div>

            <div class="stat-box">
                <p>Avg Score</p>
                <h3>{{ avg_score }}%</h3>
            </div>

            <div class="stat-box">
                <p>Best Score</p>
                <h3>{{ best_score }}%</h3>
            </div>

        </div>

        <!-- ACTIONS -->
        <div class="actions">

            <a href="/" class="btn secondary">← Back</a>

            <a href="/edit_profile" class="btn primary">✏️ Edit Profile</a>

            <a href="/logout" class="btn primary">🚪 Logout</a>

            <form action="/delete_account" method="POST" onsubmit="return confirmDelete()">
                <button type="submit" class="btn danger">
                    🗑 Delete Account
                </button>
            </form>

        </div>

    </div>

</div>
<script>
function confirmDelete() {
    return confirm("Are you sure you want to delete your account? This cannot be undone!");
}
</script>
</body>
</html>
